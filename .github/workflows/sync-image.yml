name: Sync Docker Image

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: "Source image (e.g. nginx:latest, ghcr.io/user/img:v1)"
        required: true
        type: string
      target_name:
        description: "Target image name override (auto-derived if empty)"
        required: false
        type: string
      target_registry:
        description: "Target registry"
        required: true
        type: choice
        options:
          - GHCR
          - 阿里云 ACR
          - 华为云 SWR
          - 腾讯云 CNB
          - Docker Hub
          - 腾讯云 TCR
          - Quay.io

jobs:
  sync:
    runs-on: ubuntu-24.04
    permissions:
      packages: write

    steps:
      - name: Parse source image
        id: parse
        run: |
          INPUT="${{ inputs.source_image }}"
          after_colon="${INPUT##*:}"
          if [[ "$after_colon" != *"/"* ]] && [[ "$after_colon" != "$INPUT" ]]; then
            SOURCE="${INPUT%:*}"
            TAG="$after_colon"
          else
            SOURCE="$INPUT"
            TAG="latest"
          fi

          TARGET="${{ inputs.target_name }}"
          if [ -z "$TARGET" ]; then
            TARGET="${SOURCE##*/}"
            TARGET="${TARGET#library:}"
          fi

          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo ">>> Source: $SOURCE:$TAG -> Target name: $TARGET"
          echo ">>> Registry: ${{ inputs.target_registry }}"

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Create Quay repository if needed
        if: inputs.target_registry == 'Quay.io'
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
          QUAY_NS: ${{ vars.QUAY_NAMESPACE }}
          IMAGE: ${{ steps.parse.outputs.target }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $QUAY_TOKEN" \
            "https://quay.io/api/v1/repository/$QUAY_NS/$IMAGE")
          if [ "$STATUS" = "200" ]; then
            echo ">>> Quay repo $QUAY_NS/$IMAGE already exists"
          else
            echo ">>> Creating Quay repo $QUAY_NS/$IMAGE"
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $QUAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"repository\":\"$IMAGE\",\"namespace\":\"$QUAY_NS\",\"visibility\":\"public\",\"description\":\"$IMAGE container image\"}" \
              "https://quay.io/api/v1/repository")
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo ">>> Response ($HTTP_CODE): $BODY"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo ">>> Warning: failed to create repository, will try pushing anyway"
            fi
          fi

      - name: Sync image
        env:
          SOURCE: ${{ steps.parse.outputs.source }}
          TAG: ${{ steps.parse.outputs.tag }}
          TARGET: ${{ steps.parse.outputs.target }}
          REGISTRY: ${{ inputs.target_registry }}
          # Source auth
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
          # GHCR target
          GHCR_OWNER: ${{ github.repository_owner }}
          # Aliyun
          ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
          ALIYUN_USER: ${{ vars.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_PASS: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
          ALIYUN_NS: ${{ vars.ALIYUN_NAMESPACE }}
          # Huawei
          HUAWEI_REGISTRY: ${{ vars.HUAWEI_REGISTRY }}
          HUAWEI_USER: ${{ vars.HUAWEI_REGISTRY_USERNAME }}
          HUAWEI_PASS: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}
          HUAWEI_NS: ${{ vars.HUAWEI_NAMESPACE }}
          # Tencent CNB
          TENCENT_REGISTRY: ${{ vars.TENCENT_REGISTRY }}
          TENCENT_USER: ${{ vars.TENCENT_REGISTRY_USERNAME }}
          TENCENT_PASS: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}
          TENCENT_NS: ${{ vars.TENCENT_NAMESPACE }}
          # Docker Hub
          DOCKERHUB_NS: ${{ vars.DOCKERHUB_NAMESPACE }}
          # TCR
          TCR_USER: ${{ vars.TCR_USERNAME }}
          TCR_PASS: ${{ secrets.TCR_PASSWORD }}
          TCR_NS: ${{ vars.TCR_NAMESPACE }}
          # Quay
          QUAY_USER: ${{ vars.QUAY_USERNAME }}
          QUAY_PASS: ${{ secrets.QUAY_PASSWORD }}
          QUAY_NS: ${{ vars.QUAY_NAMESPACE }}
        run: |
          # Source credentials
          SRC_USER="" SRC_PASS=""
          if [[ "$SOURCE" == ghcr.io/* ]]; then
            SRC_USER="$GHCR_USER" SRC_PASS="$GHCR_PASS"
          elif [[ -n "$DOCKERHUB_USER" ]]; then
            SRC_USER="$DOCKERHUB_USER" SRC_PASS="$DOCKERHUB_PASS"
          fi

          args=(--all --retry-times 3)
          if [[ -n "$SRC_USER" ]]; then
            args+=(--src-creds "$SRC_USER:$SRC_PASS")
          fi

          case "$REGISTRY" in
            GHCR)
              DST="ghcr.io/$GHCR_OWNER/$TARGET"
              args+=(--dest-creds "$GHCR_USER:$GHCR_PASS")
              ;;
            "阿里云 ACR")
              DST="$ALIYUN_REGISTRY/$ALIYUN_NS/$TARGET"
              args+=(--dest-creds "$ALIYUN_USER:$ALIYUN_PASS")
              ;;
            "华为云 SWR")
              DST="$HUAWEI_REGISTRY/$HUAWEI_NS/$TARGET"
              args+=(--dest-creds "$HUAWEI_USER:$HUAWEI_PASS")
              ;;
            "腾讯云 CNB")
              DST="$TENCENT_REGISTRY/$TENCENT_NS/$TARGET"
              args+=(--dest-creds "$TENCENT_USER:$TENCENT_PASS")
              ;;
            "Docker Hub")
              DST="docker.io/$DOCKERHUB_NS/$TARGET"
              args+=(--dest-creds "$DOCKERHUB_USER:$DOCKERHUB_PASS")
              ;;
            "腾讯云 TCR")
              DST="ccr.ccs.tencentyun.com/$TCR_NS/$TARGET"
              args+=(--dest-creds "$TCR_USER:$TCR_PASS")
              ;;
            "Quay.io")
              DST="quay.io/$QUAY_NS/$TARGET"
              args+=(--dest-creds "$QUAY_USER:$QUAY_PASS")
              ;;
            *)
              echo "::error::Unknown registry: $REGISTRY"
              exit 1
              ;;
          esac

          echo ">>> Syncing $SOURCE:$TAG -> $DST:$TAG ($REGISTRY)"
          skopeo copy "${args[@]}" "docker://$SOURCE:$TAG" "docker://$DST:$TAG"
          echo "::notice title=Image Synced::$DST:$TAG"

      - name: Summary
        run: |
          echo "### Sync Complete :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source | \`${{ steps.parse.outputs.source }}:${{ steps.parse.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | \`${{ steps.parse.outputs.target }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | ${{ inputs.target_registry }} |" >> "$GITHUB_STEP_SUMMARY"
