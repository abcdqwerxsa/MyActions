name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      dockerfile_url:
        description: "Dockerfile URL (leave empty to use repo Dockerfile)"
        required: false
        type: string
      git_repo_url:
        description: "Git repo URL (e.g. https://github.com/user/repo.git)"
        required: false
        type: string
      git_repo_ref:
        description: "Git branch/tag/commit (default: main)"
        required: false
        default: "main"
        type: string
      git_repo_path:
        description: "Subdirectory containing Dockerfile (default: repo root)"
        required: false
        type: string
      image_name:
        description: "Image name (e.g. my-image or owner/my-image)"
        required: true
        type: string
      image_tags:
        description: "Tags (comma-separated, e.g. latest,v1.0)"
        required: false
        default: "latest"
        type: string
      push_ghcr:
        description: "Push to GitHub Container Registry"
        type: boolean
        default: true
      push_aliyun:
        description: "Push to 阿里云 ACR"
        type: boolean
        default: false
      push_huawei:
        description: "Push to 华为云 SWR"
        type: boolean
        default: false
      push_tencent:
        description: "Push to 腾讯云 CNB"
        type: boolean
        default: false
      push_dockerhub:
        description: "Push to Docker Hub"
        type: boolean
        default: false
      push_tcr:
        description: "Push to 腾讯云 TCR"
        type: boolean
        default: false
      push_quay:
        description: "Push to Quay.io"
        type: boolean
        default: false

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      image_name: ${{ steps.config.outputs.image_name }}
      short_image_name: ${{ steps.config.outputs.short_image_name }}
      tags: ${{ steps.config.outputs.tags }}
      dockerfile_source: ${{ steps.config.outputs.dockerfile_source }}
      git_repo_url: ${{ steps.config.outputs.git_repo_url }}
      git_repo_ref: ${{ steps.config.outputs.git_repo_ref }}
      git_repo_path: ${{ steps.config.outputs.git_repo_path }}
    permissions:
      contents: read

    steps:
      - name: Parse image config
        id: config
        run: |
          # Parse image name
          IMAGE_NAME="${{ inputs.image_name }}"
          if echo "$IMAGE_NAME" | grep -qv '/'; then
            IMAGE_NAME="${{ github.repository_owner }}/${IMAGE_NAME}"
          fi
          echo ">>> Image name: $IMAGE_NAME"

          # Parse tags
          TAGS="${{ inputs.image_tags }}"
          echo ">>> Tags: $TAGS"

          DOCKERFILE_SOURCE="repo"

          if [ -n "${{ inputs.dockerfile_url }}" ]; then
            DOCKERFILE_SOURCE="url"
            echo ">>> Using Dockerfile from URL: ${{ inputs.dockerfile_url }}"
          fi

          if [ -n "${{ inputs.git_repo_url }}" ]; then
            DOCKERFILE_SOURCE="git"
            echo ">>> Using Dockerfile from Git repo: ${{ inputs.git_repo_url }} @ ${{ inputs.git_repo_ref }}"
          fi

          TAG_LIST=""
          IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            tag=$(echo "$tag" | xargs)
            TAG_LIST="${TAG_LIST}${GHCR_REGISTRY}/${IMAGE_NAME}:${tag}\n"
          done
          TAG_LIST=$(echo -e "$TAG_LIST" | sed '/^$/d')

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          # Short name: strip owner prefix for non-GHCR registries
          echo "short_image_name=${IMAGE_NAME##*/}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$TAG_LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "dockerfile_source=$DOCKERFILE_SOURCE" >> "$GITHUB_OUTPUT"
          echo "git_repo_url=${{ inputs.git_repo_url }}" >> "$GITHUB_OUTPUT"
          echo "git_repo_ref=${{ inputs.git_repo_ref }}" >> "$GITHUB_OUTPUT"
          echo "git_repo_path=${{ inputs.git_repo_path }}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            suffix: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Dockerfile from URL
        if: needs.prepare.outputs.dockerfile_source == 'url'
        run: |
          curl -fsSL "${{ inputs.dockerfile_url }}" -o Dockerfile
          echo ">>> Downloaded Dockerfile from URL"
          head -5 Dockerfile

      - name: Clone Git repo
        if: needs.prepare.outputs.dockerfile_source == 'git'
        run: |
          GIT_REPO_URL="${{ needs.prepare.outputs.git_repo_url }}"
          GIT_REPO_REF="${{ needs.prepare.outputs.git_repo_ref }}"
          GIT_REPO_PATH="${{ needs.prepare.outputs.git_repo_path }}"

          echo ">>> Cloning $GIT_REPO_URL @ ${GIT_REPO_REF:-main}"
          git clone --depth 1 --branch "${GIT_REPO_REF:-main}" "$GIT_REPO_URL" /tmp/build-repo

          BUILD_CTX="/tmp/build-repo"
          if [ -n "$GIT_REPO_PATH" ]; then
            BUILD_CTX="/tmp/build-repo/$GIT_REPO_PATH"
          fi

          echo ">>> Build context: $BUILD_CTX"
          ls -la "$BUILD_CTX"
          echo "build_context=$BUILD_CTX" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ needs.prepare.outputs.dockerfile_source == 'git' && env.build_context || '.' }}
          push: true
          tags: |
            ${{ needs.prepare.outputs.tags }}
            ${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ github.sha }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  merge:
    runs-on: ubuntu-24.04
    needs: [prepare, build]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        run: |
          IMAGE="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"

          SOURCES=""
          for suffix in amd64 arm64; do
            TAG="${IMAGE}:${{ github.sha }}-${suffix}"
            echo ">>> Adding: $TAG"
            SOURCES="$SOURCES $TAG"
          done

          IFS=',' read -ra TAG_ARRAY <<< "$(echo '${{ needs.prepare.outputs.tags }}' | tr '\n' ',')"
          MANIFEST_TAGS=""
          for tag_line in "${TAG_ARRAY[@]}"; do
            tag_line=$(echo "$tag_line" | xargs | sed "s|${IMAGE}:||")
            [ -z "$tag_line" ] && continue
            MANIFEST_TAGS="$MANIFEST_TAGS -t ${IMAGE}:${tag_line}"
          done

          echo ">>> Creating manifest with tags: $MANIFEST_TAGS"
          docker buildx imagetools create \
            $MANIFEST_TAGS \
            $SOURCES

      - name: Inspect multi-arch image
        if: always()
        continue-on-error: true
        run: |
          IMAGE="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          FIRST_TAG=$(echo '${{ needs.prepare.outputs.tags }}' | head -1 | xargs)
          docker buildx imagetools inspect "${IMAGE}:${FIRST_TAG##*:}"

  # --- Sync to Chinese registries ---

  sync-aliyun:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_aliyun == true
    permissions:
      packages: read
    steps:
      - name: Login to GHCR (source)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR (target)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ALIYUN_REGISTRY }}
          username: ${{ vars.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Sync to Aliyun ACR
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="${{ vars.ALIYUN_REGISTRY }}/${{ vars.ALIYUN_NAMESPACE }}/${{ needs.prepare.outputs.short_image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            skopeo copy --all "docker://${SRC}:${tag_line}" "docker://${DST}:${tag_line}"
          done

  sync-huawei:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_huawei == true
    permissions:
      packages: read
    steps:
      - name: Login to GHCR (source)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Huawei SWR (target)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HUAWEI_REGISTRY }}
          username: ${{ vars.HUAWEI_REGISTRY_USERNAME }}
          password: ${{ secrets.HUAWEI_REGISTRY_PASSWORD }}

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Sync to Huawei SWR
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="${{ vars.HUAWEI_REGISTRY }}/${{ vars.HUAWEI_NAMESPACE }}/${{ needs.prepare.outputs.short_image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            skopeo copy --all "docker://${SRC}:${tag_line}" "docker://${DST}:${tag_line}"
          done

  sync-tencent:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_tencent == true
    permissions:
      packages: read
    steps:
      - name: Login to GHCR (source)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Tencent CNB (target)
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.TENCENT_REGISTRY }}
          username: ${{ vars.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Sync to Tencent CNB
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="${{ vars.TENCENT_REGISTRY }}/${{ vars.TENCENT_NAMESPACE }}/${{ needs.prepare.outputs.short_image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            skopeo copy --all "docker://${SRC}:${tag_line}" "docker://${DST}:${tag_line}"
          done

  sync-dockerhub:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_dockerhub == true
    permissions:
      packages: read
    steps:
      - name: Login to GHCR (source)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub (target)
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Sync to Docker Hub
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ needs.prepare.outputs.short_image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            skopeo copy --all "docker://${SRC}:${tag_line}" "docker://${DST}:${tag_line}"
          done

  sync-tcr:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_tcr == true
    permissions:
      packages: read
    steps:
      - name: Login to GHCR (source)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Tencent TCR (target)
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ vars.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Sync to Tencent TCR
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="ccr.ccs.tencentyun.com/${{ vars.TCR_NAMESPACE }}/${{ needs.prepare.outputs.short_image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            skopeo copy --all --retry-times 3 "docker://${SRC}:${tag_line}" "docker://${DST}:${tag_line}"
          done

  sync-quay:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_quay == true
    permissions:
      packages: read
    steps:
      - name: Login to GHCR (source)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Quay.io (target)
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Create Quay.io repository if not exists
        env:
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
          QUAY_NS: ${{ vars.QUAY_NAMESPACE }}
          IMAGE: ${{ needs.prepare.outputs.short_image_name }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $QUAY_TOKEN" \
            "https://quay.io/api/v1/repository/$QUAY_NS/$IMAGE")
          if [ "$STATUS" = "200" ]; then
            echo ">>> Repository $QUAY_NS/$IMAGE already exists"
          else
            echo ">>> Creating repository $QUAY_NS/$IMAGE"
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $QUAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"repository\":\"$IMAGE\",\"namespace\":\"$QUAY_NS\",\"visibility\":\"public\",\"description\":\"$IMAGE container image\"}" \
              "https://quay.io/api/v1/repository")
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo ">>> Response ($HTTP_CODE): $BODY"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo ">>> Warning: failed to create repository, will try pushing anyway"
            fi
          fi

      - name: Install skopeo
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Sync to Quay.io
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="quay.io/${{ vars.QUAY_NAMESPACE }}/${{ needs.prepare.outputs.short_image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            skopeo copy --all --retry-times 3 "docker://${SRC}:${tag_line}" "docker://${DST}:${tag_line}"
          done

  cleanup-ghcr:
    runs-on: ubuntu-24.04
    needs: [prepare, sync-aliyun, sync-huawei, sync-tencent, sync-dockerhub, sync-tcr, sync-quay]
    if: inputs.push_ghcr == false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Remove temporary GHCR image
        run: |
          IMAGE="${{ needs.prepare.outputs.image_name }}"
          VERSION="${{ github.sha }}"
          echo ">>> Cleaning up temporary GHCR image: $IMAGE"
          for tag in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            echo ">>> Deleting tag: $tag"
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/user/packages/container/${IMAGE#*/}/versions?tag=${tag}" || true
          done
