name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      dockerfile_url:
        description: "Dockerfile URL (leave empty to use repo Dockerfile)"
        required: false
        type: string
      config_file:
        description: "Config YAML path (relative to repo root, e.g. image-config.yaml)"
        required: false
        default: "image-config.yaml"
        type: string
      push_ghcr:
        description: "Push to GitHub Container Registry"
        type: boolean
        default: true
      push_aliyun:
        description: "Push to 阿里云 ACR"
        type: boolean
        default: false
      push_huawei:
        description: "Push to 华为云 SWR"
        type: boolean
        default: false
      push_tencent:
        description: "Push to 腾讯云 CNB"
        type: boolean
        default: false

env:
  GHCR_REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      image_name: ${{ steps.config.outputs.image_name }}
      tags: ${{ steps.config.outputs.tags }}
      dockerfile_source: ${{ steps.config.outputs.dockerfile_source }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse image config
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config_file || 'image-config.yaml' }}"

          # Default values
          IMAGE_NAME="${{ github.repository }}"
          TAGS="latest,${{ github.sha }}"
          DOCKERFILE_SOURCE="repo"

          # Override from config file if exists
          if [ -f "$CONFIG_FILE" ]; then
            echo ">>> Found config file: $CONFIG_FILE"
            VAL=$(grep -E '^image_name:' "$CONFIG_FILE" | head -1 | sed 's/^image_name:[[:space:]]*//' | tr -d '"' | tr -d "'")
            if [ -n "$VAL" ]; then
              if echo "$VAL" | grep -qv '/'; then
                IMAGE_NAME="${{ github.repository_owner }}/${VAL}"
              else
                IMAGE_NAME="$VAL"
              fi
            fi
            VAL=$(grep -E '^tags:' "$CONFIG_FILE" | head -1 | sed 's/^tags:[[:space:]]*//' | tr -d '"' | tr -d "'")
            [ -n "$VAL" ] && TAGS="$VAL"
            echo ">>> Config: image_name=$IMAGE_NAME, tags=$TAGS"
          else
            echo ">>> No config file found, using defaults"
          fi

          if [ -n "${{ inputs.dockerfile_url }}" ]; then
            DOCKERFILE_SOURCE="url"
            echo ">>> Using Dockerfile from URL: ${{ inputs.dockerfile_url }}"
          fi

          TAG_LIST=""
          IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            tag=$(echo "$tag" | xargs)
            TAG_LIST="${TAG_LIST}${GHCR_REGISTRY}/${IMAGE_NAME}:${tag}\n"
          done
          TAG_LIST=$(echo -e "$TAG_LIST" | sed '/^$/d')

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$TAG_LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "dockerfile_source=$DOCKERFILE_SOURCE" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            suffix: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Dockerfile from URL
        if: needs.prepare.outputs.dockerfile_source == 'url'
        run: |
          curl -fsSL "${{ inputs.dockerfile_url }}" -o Dockerfile
          echo ">>> Downloaded Dockerfile from URL"
          head -5 Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.prepare.outputs.tags }}
            ${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ github.sha }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  merge:
    runs-on: ubuntu-24.04
    needs: [prepare, build]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push
        run: |
          IMAGE="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"

          SOURCES=""
          for suffix in amd64 arm64; do
            TAG="${IMAGE}:${{ github.sha }}-${suffix}"
            echo ">>> Adding: $TAG"
            SOURCES="$SOURCES $TAG"
          done

          IFS=',' read -ra TAG_ARRAY <<< "$(echo '${{ needs.prepare.outputs.tags }}' | tr '\n' ',')"
          MANIFEST_TAGS=""
          for tag_line in "${TAG_ARRAY[@]}"; do
            tag_line=$(echo "$tag_line" | xargs | sed "s|${IMAGE}:||")
            [ -z "$tag_line" ] && continue
            MANIFEST_TAGS="$MANIFEST_TAGS -t ${IMAGE}:${tag_line}"
          done

          echo ">>> Creating manifest with tags: $MANIFEST_TAGS"
          docker buildx imagetools create \
            $MANIFEST_TAGS \
            $SOURCES

      - name: Inspect multi-arch image
        run: |
          IMAGE="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          docker buildx imagetools inspect "${IMAGE}:latest"

  # --- Sync to Chinese registries ---

  sync-aliyun:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_aliyun == true
    steps:
      - name: Install regctl
        run: |
          curl -fsSL "https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64" \
            -o /usr/local/bin/regctl && chmod +x /usr/local/bin/regctl

      - name: Login registries
        run: |
          regctl registry login "${{ env.GHCR_REGISTRY }}" \
            -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          regctl registry login "${{ secrets.ALIYUN_REGISTRY }}" \
            -u "${{ secrets.ALIYUN_REGISTRY_USERNAME }}" -p "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

      - name: Sync to Aliyun ACR
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ needs.prepare.outputs.image_name }}"
          IFS=',' read -ra TAG_ARRAY <<< "$(echo '${{ needs.prepare.outputs.tags }}' | sed 's|.*/||;s|.*:||' | tr '\n' ',')"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            regctl image copy "${SRC}:${tag_line}" "${DST}:${tag_line}"
          done

  sync-huawei:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_huawei == true
    steps:
      - name: Install regctl
        run: |
          curl -fsSL "https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64" \
            -o /usr/local/bin/regctl && chmod +x /usr/local/bin/regctl

      - name: Login registries
        run: |
          regctl registry login "${{ env.GHCR_REGISTRY }}" \
            -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          regctl registry login "${{ secrets.HUAWEI_REGISTRY }}" \
            -u "${{ secrets.HUAWEI_REGISTRY_USERNAME }}" -p "${{ secrets.HUAWEI_REGISTRY_PASSWORD }}"

      - name: Sync to Huawei SWR
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="${{ secrets.HUAWEI_REGISTRY }}/${{ secrets.HUAWEI_NAMESPACE }}/${{ needs.prepare.outputs.image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            regctl image copy "${SRC}:${tag_line}" "${DST}:${tag_line}"
          done

  sync-tencent:
    runs-on: ubuntu-24.04
    needs: [prepare, merge]
    if: inputs.push_tencent == true
    steps:
      - name: Install regctl
        run: |
          curl -fsSL "https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64" \
            -o /usr/local/bin/regctl && chmod +x /usr/local/bin/regctl

      - name: Login registries
        run: |
          regctl registry login "${{ env.GHCR_REGISTRY }}" \
            -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          regctl registry login "${{ secrets.TENCENT_REGISTRY }}" \
            -u "${{ secrets.TENCENT_REGISTRY_USERNAME }}" -p "${{ secrets.TENCENT_REGISTRY_PASSWORD }}"

      - name: Sync to Tencent CNB
        run: |
          SRC="${{ env.GHCR_REGISTRY }}/${{ needs.prepare.outputs.image_name }}"
          DST="${{ secrets.TENCENT_REGISTRY }}/${{ secrets.TENCENT_NAMESPACE }}/${{ needs.prepare.outputs.image_name }}"
          echo ">>> Syncing $SRC -> $DST"
          for tag_line in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag_line=$(echo "$tag_line" | xargs)
            [ -z "$tag_line" ] && continue
            echo ">>> Copying tag: $tag_line"
            regctl image copy "${SRC}:${tag_line}" "${DST}:${tag_line}"
          done

  cleanup-ghcr:
    runs-on: ubuntu-24.04
    needs: [prepare, sync-aliyun, sync-huawei, sync-tencent]
    if: inputs.push_ghcr == false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Remove temporary GHCR image
        run: |
          IMAGE="${{ needs.prepare.outputs.image_name }}"
          VERSION="${{ github.sha }}"
          echo ">>> Cleaning up temporary GHCR image: $IMAGE"
          for tag in $(echo '${{ needs.prepare.outputs.tags }}' | grep -oP '(?<=:)[^\n]+'); do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            echo ">>> Deleting tag: $tag"
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/user/packages/container/${IMAGE#*/}/versions?tag=${tag}" || true
          done
