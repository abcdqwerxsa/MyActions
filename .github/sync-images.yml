# Sync images configuration
# source: source image name (e.g. "nginx", "ghcr.io/user/img", "quay.io/prometheus/node-exporter")
# tag: image tag (default: "latest")
# name: target image name override (default: derived from source, e.g. "calciumion/new-api" -> "new-api")

images:
  - source: "nginx"
    tag: "latest"
  - source: "redis"
    tag: "7-alpine"
